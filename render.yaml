services:
  - type: web
    name: doctor4you-backend
    runtime: python
    rootDir: health_tracker
    buildCommand: |
      apt-get update && apt-get install -y tesseract-ocr poppler-utils && pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free
